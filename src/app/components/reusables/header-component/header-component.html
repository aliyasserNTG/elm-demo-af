<header role="banner" class="elm-header">
  <nav class="elm-navbar d-flex align-items-center w-100" aria-label="التنقل الرئيسي">

    <!-- Logo — far right in RTL -->
    <a routerLink="/" class="navbar-brand d-flex align-items-center flex-shrink-0 me-3" aria-label="الصفحة الرئيسية -Minister">
      <img ngSrc="/assets/images/elm-logo-color.png" width="72" height="36" alt="شعارMinister"/>
    </a>

    <!-- Navigation tabs -->
    <div class="nav-tabs d-flex align-items-center flex-grow-1 border-0" role="menubar" aria-label="قائمة التنقل">
      <a routerLink="/" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" tabindex="0">
        الصفحة الرئيسية <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </a>
      <a routerLink="/services" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" tabindex="0">
        الخدمات <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </a>
      <a routerLink="/form" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" tabindex="0">
        النموذج <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </a>
      <button type="button" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" aria-haspopup="true" aria-expanded="false" aria-label="توبيت 4">
        توبيت 4 <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </button>
      <button type="button" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" aria-haspopup="true" aria-expanded="false" aria-label="توبيت 5">
        توبيت 5 <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </button>
      <button type="button" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" aria-haspopup="true" aria-expanded="false" aria-label="توبيت 6">
        توبيت 6 <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </button>
      <button type="button" class="nav-tab d-inline-flex align-items-center gap-1" role="menuitem" aria-haspopup="true" aria-expanded="false" aria-label="توبيت 7">
        توبيت 7 <i class="pi pi-chevron-down nav-chevron" aria-hidden="true"></i>
      </button>
    </div>

    <!-- Action buttons — far left in RTL -->
    <div class="nav-actions d-flex align-items-center gap-1 flex-shrink-0" role="group" aria-label="إجراءات المستخدم">

      <!-- Search -->
      <button type="button" class="nav-action-btn d-inline-flex align-items-center gap-2" aria-label="البحث">
        <img ngSrc="/assets/images/language-icon" alt=""/>
        <span>البحث</span>
      </button>

      <!-- Language switcher -->
      <button type="button" class="nav-action-btn nav-btn-lang d-inline-flex align-items-center gap-2" (click)="toggleLanguage()" aria-label="التبديل إلى اللغة الأخرى">
        <i class="pi pi-language" aria-hidden="true"></i>
        <span>@if (currentLang() === 'ar') { English } @else { العربية }</span>
      </button>

      <!-- Login -->
      <button type="button" class="nav-action-btn nav-btn-login d-inline-flex align-items-center gap-2" aria-label="تسجيل الدخول">
        <i class="pi pi-user" aria-hidden="true"></i>
        <span>تسجيل الدخول</span>
      </button>

    </div>
  </nav>
</header>
